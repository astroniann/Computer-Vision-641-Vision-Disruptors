# BraTS Synthesis Configuration

# Data paths
data:
  root_dir: "/path/to/BraTS2024_Synthesis"  # UPDATE THIS
  train_split: 0.8
  val_split: 0.2
  seed: 42
  
# Data properties
data_specs:
  image_size: [240, 240, 155]
  modalities: ['t1', 't2', 'flair', 't1ce']
  target_spacing: [1.0, 1.0, 1.0]
  
# Preprocessing
preprocessing:
  clip_percentiles: [0.5, 99.5]
  normalization: "zscore"  # Options: zscore, minmax
  
# Model architecture
model:
  name: "UNet3D"
  in_channels: 3  # T1, T2, FLAIR
  out_channels: 1  # T1ce
  base_channels: 32
  num_levels: 4
  use_batch_norm: true
  dropout: 0.1
  
# Training
training:
  batch_size: 1
  num_epochs: 50
  learning_rate: 0.0001
  weight_decay: 0.0001
  optimizer: "AdamW"
  scheduler: "CosineAnnealing"
  gradient_clip: 1.0
  
# Logging
logging:
  save_dir: "./experiments"
  experiment_name: "baseline_unet"
  log_interval: 10
  save_interval: 5
  visualize_interval: 5
  
# Hardware
hardware:
  device: "cuda"
  num_workers: 4
  pin_memory: true